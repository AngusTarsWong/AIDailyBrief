<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Daily Brief | 日报总览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1b2838;
      --panel: rgba(14, 24, 38, 0.72);
      --panel-border: rgba(96, 165, 250, 0.16);
      --text: #e2e8f0;
      --muted: #8ea3b8;
      --primary: #60a5fa;
      --accent: #a78bfa;
      --success: #34d399;
      --warning: #fbbf24;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 45% at 50% -10%, rgba(56, 189, 248, 0.18), transparent),
        radial-gradient(ellipse 60% 45% at 100% 20%, rgba(139, 92, 246, 0.14), transparent),
        radial-gradient(ellipse 60% 60% at 0% 100%, rgba(52, 211, 153, 0.10), transparent),
        repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(148, 163, 184, 0.08) 49px, rgba(148, 163, 184, 0.08) 50px),
        repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(148, 163, 184, 0.08) 49px, rgba(148, 163, 184, 0.08) 50px);
      z-index: 0;
      pointer-events: none;
    }
    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 20px 64px;
      position: relative;
      z-index: 1;
    }
    .hero {
      text-align: center;
      margin-bottom: 28px;
      padding: 12px 0 28px;
      position: relative;
    }
    .hero::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 220px;
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(96, 165, 250, 0.65), rgba(167, 139, 250, 0.65), transparent);
    }
    .hero h1 {
      font-size: 40px;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      color: var(--muted);
      max-width: 760px;
      margin: 0 auto;
      font-size: 15px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 28px 0 18px;
    }
    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.15);
      background: rgba(15, 23, 42, 0.45);
      color: var(--muted);
      font-size: 13px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .pill strong {
      color: var(--text);
      font-weight: 700;
    }
    .latest-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      color: #dbeafe;
      text-decoration: none;
      border: 1px solid rgba(96, 165, 250, 0.28);
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.92), rgba(30, 41, 59, 0.74));
      transition: all 0.2s ease;
    }
    .latest-link:hover {
      border-color: rgba(96, 165, 250, 0.5);
      transform: translateY(-1px);
    }
    .board {
      position: relative;
      border-radius: 24px;
      padding: 18px;
      background: rgba(27, 40, 56, 0.44);
    }
    .board::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(148, 163, 184, 0.12), transparent, rgba(148, 163, 184, 0.05));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .board-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 0 6px;
    }
    .board-head h2 {
      font-size: 20px;
      font-weight: 700;
      color: #f8fafc;
    }
    .board-head span {
      color: var(--muted);
      font-size: 13px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }
    .report-card {
      display: block;
      text-decoration: none;
      color: inherit;
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(15, 23, 42, 0.78));
      border: 1px solid var(--panel-border);
      border-left: 3px solid rgba(52, 211, 153, 0.55);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.22);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .report-card:hover {
      transform: translateY(-2px);
      border-color: rgba(96, 165, 250, 0.35);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }
    .report-card::after {
      content: "";
      position: absolute;
      inset: auto -40px -40px auto;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.16), transparent 70%);
      pointer-events: none;
    }
    .report-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .report-date {
      font-size: 22px;
      line-height: 1.1;
      font-weight: 800;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }
    .report-tag {
      flex-shrink: 0;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      color: #d1fae5;
      background: rgba(52, 211, 153, 0.12);
      border: 1px solid rgba(52, 211, 153, 0.2);
    }
    .report-title {
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 16px;
      min-height: 44px;
    }
    .report-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .report-open {
      color: var(--primary);
      font-weight: 600;
    }
    .empty,
    .loading,
    .error {
      padding: 24px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.68);
      border: 1px solid rgba(148, 163, 184, 0.12);
      color: var(--muted);
      text-align: center;
    }
    .footer {
      margin-top: 18px;
      text-align: center;
      color: #60758b;
      font-size: 12px;
    }
    @media (max-width: 640px) {
      .container { padding: 28px 14px 48px; }
      .hero h1 { font-size: 30px; }
      .board { padding: 14px; }
      .report-date { font-size: 19px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>AI Daily Brief</h1>
      <p>每天沉淀一份 LLM 与 Agent 领域日报。在这里可以一眼查看所有历史日报，并通过新窗口快速打开单日完整报告。</p>
    </header>

    <div class="toolbar">
      <div class="stats">
        <div class="pill">日报总数 <strong id="report-count">加载中</strong></div>
        <div class="pill">最近更新 <strong id="latest-date">加载中</strong></div>
      </div>
      <a id="latest-link" class="latest-link" href="./llm-briefing-2026-07-08.html" target="_blank" rel="noopener noreferrer">
        查看最新日报
      </a>
    </div>

    <section class="board">
      <div class="board-head">
        <h2>日报总览</h2>
        <span>点击卡片后会在新窗口打开对应 HTML 报告</span>
      </div>
      <div id="report-list" class="grid">
        <div class="loading">正在加载日报列表...</div>
      </div>
    </section>

    <div class="footer">由 GitHub Pages 提供静态访问，列表页自动从仓库 `docs/` 目录读取日报文件。</div>
  </div>

  <script>
    const REPO_OWNER = "AngusTarsWong";
    const REPO_NAME = "AIDailyBrief";
    const DOCS_PATH = "docs";
    const FALLBACK_REPORTS = [
      "llm-briefing-2026-07-08.html",
      "llm-briefing-2026-07-07.html"
    ];

    function extractDate(fileName) {
      const match = fileName.match(/llm-briefing-(\d{4}-\d{2}-\d{2})\.html$/);
      return match ? match[1] : "";
    }

    function formatDateLabel(dateStr) {
      if (!dateStr) return "未知日期";
      return dateStr;
    }

    function buildCard(fileName, isLatest) {
      const dateStr = extractDate(fileName);
      const safeDate = formatDateLabel(dateStr);
      const tag = isLatest ? '<span class="report-tag">最新</span>' : '<span class="report-tag">日报</span>';
      return `
        <a class="report-card" href="./${fileName}" target="_blank" rel="noopener noreferrer">
          <div class="report-top">
            <div class="report-date">${safeDate}</div>
            ${tag}
          </div>
          <div class="report-title">LLM & Agent Daily Briefing 每日技术情报总览</div>
          <div class="report-meta">
            <span>${fileName}</span>
            <span class="report-open">新窗口打开</span>
          </div>
        </a>
      `;
    }

    function sortReports(fileNames) {
      return fileNames
        .filter((name) => /^llm-briefing-\d{4}-\d{2}-\d{2}\.html$/.test(name))
        .sort((a, b) => extractDate(b).localeCompare(extractDate(a)));
    }

    function renderReports(fileNames) {
      const listEl = document.getElementById("report-list");
      const countEl = document.getElementById("report-count");
      const latestDateEl = document.getElementById("latest-date");
      const latestLinkEl = document.getElementById("latest-link");
      const sorted = sortReports(fileNames);

      if (!sorted.length) {
        listEl.innerHTML = '<div class="empty">暂时还没有检测到日报 HTML 文件。</div>';
        countEl.textContent = "0";
        latestDateEl.textContent = "暂无";
        latestLinkEl.style.display = "none";
        return;
      }

      const latestFile = sorted[0];
      const latestDate = extractDate(latestFile);
      countEl.textContent = String(sorted.length);
      latestDateEl.textContent = latestDate || "未知";
      latestLinkEl.href = `./${latestFile}`;
      latestLinkEl.textContent = `查看最新日报 · ${latestDate}`;
      listEl.innerHTML = sorted.map((fileName, index) => buildCard(fileName, index === 0)).join("");
    }

    async function fetchReportsFromGitHub() {
      const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DOCS_PATH}`;
      const response = await fetch(apiUrl, {
        headers: { "Accept": "application/vnd.github+json" }
      });
      if (!response.ok) {
        throw new Error(`GitHub API 请求失败: ${response.status}`);
      }
      const files = await response.json();
      return files
        .filter((item) => item && item.type === "file")
        .map((item) => item.name);
    }

    async function init() {
      const listEl = document.getElementById("report-list");
      try {
        const reports = await fetchReportsFromGitHub();
        renderReports(reports);
      } catch (error) {
        console.warn("GitHub API 加载失败，使用 fallback 列表。", error);
        if (FALLBACK_REPORTS.length) {
          renderReports(FALLBACK_REPORTS);
        } else {
          listEl.innerHTML = '<div class="error">日报列表加载失败，请稍后重试。</div>';
        }
      }
    }

    init();
  </script>
</body>
</html>
